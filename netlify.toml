# Netlify Configuration for Blind Assistive Head Tech Guide
# This file configures deployment settings for Netlify

[build]
# Build command - runs Vite build
command = "npm run build"
# Build output directory - where Vite generates the static site
publish = "dist"
# Functions directory (if needed for serverless functions)
functions = "netlify/functions"

[build.environment]
# Node.js version
NODE_VERSION = "18.17.0"

# Redirect all requests to index.html for React Router (SPA)
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# Cache headers for optimal performance
[[headers]]
for = "/"
[headers.values]
Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
for = "/index.html"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
X-Frame-Options = "SAMEORIGIN"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "microphone=*, speaker=*"
